services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=pandityatra_db
      - POSTGRES_USER=pandit_admin
      - POSTGRES_PASSWORD=secure_password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pandit_admin -d pandityatra_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .                 # ← Important: Now points to root
      dockerfile: Dockerfile     # ← Uses the new root Dockerfile
    command: daphne -b 0.0.0.0 -p 8000 pandityatra_backend.asgi:application
    env_file:
      - .env
    volumes:
      - ./backend:/app           # Keep this for easy development
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://pandit_admin:secure_password@db:5432/pandityatra_db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=0
      - SERVE_MEDIA_FILES=1
      - ALLOWED_HOSTS="*"
      - CORS_ALLOW_ALL_ORIGINS=False
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
      - CSRF_TRUSTED_ORIGINS=http://localhost:5173,http://localhost:8000
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  video-reminder:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "while true; do
      python manage.py send_video_reminders;
      sleep 60;
      done"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://pandit_admin:secure_password@db:5432/pandityatra_db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=0
      - SERVE_MEDIA_FILES=1
      - ALLOWED_HOSTS="*"
      - CORS_ALLOW_ALL_ORIGINS=False
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
      - CSRF_TRUSTED_ORIGINS=http://localhost:5173,http://localhost:8000
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pandityatra.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  pgadmin_data: