# Coturn minimal config for PanditYatra (student-budget profile)
# IMPORTANT: For production, change credentials and public IP values.

listening-port=3478
fingerprint
lt-cred-mech
realm=pandityatra.local

# Static user for quick start (username:password)
user=pandityatra:pandityatra_turn_password

# Relay range kept narrow to reduce server resource usage
min-port=49160
max-port=49200

# Logging
verbose
simple-log

# Docker/Linux local setup
listening-ip=0.0.0.0
# For cloud/VPS behind NAT, set external-ip=<public-ip>/<private-ip>
# external-ip=YOUR_PUBLIC_IP

# For stricter production hardening
no-loopback-peers
no-tlsv1
no-tlsv1_1

# Avoid unsecured modes
no-multicast-peers
no-cli
