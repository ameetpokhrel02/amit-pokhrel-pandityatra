services:
  - type: web
    name: pandityatra-api
    env: docker
    dockerfilePath: Dockerfile          # ← Now in root
    repo: https://github.com/ameetpokhrel02/amit-pokhrel-pandityatra/tree/main/pandityatra    branch: main
    rootDir: .
    
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: pandityatra-db
          property: connectionString

databases:
  - name: pandityatra-db
    type: postgres
    version: "16"
    region: singapore
    plan: free