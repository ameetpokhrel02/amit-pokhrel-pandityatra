services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-pandityatra_db}
      - POSTGRES_USER=${POSTGRES_USER:-pandit_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 200M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pandit_admin -d pandityatra_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 100M
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.ec2
    command: daphne -b 0.0.0.0 -p 8000 pandityatra_backend.asgi:application
    restart: unless-stopped
    env_file:
      - .env.ec2
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-pandit_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pandityatra_db}
      - REDIS_URL=redis://redis:6379/0
    deploy:
      resources:
        limits:
          memory: 400M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  video-reminder:
    build:
      context: .
      dockerfile: Dockerfile.ec2
    command: >
      sh -c "while true; do
      python manage.py send_video_reminders;
      sleep 60;
      done"
    restart: unless-stopped
    env_file:
      - .env.ec2
    deploy:
      resources:
        limits:
          memory: 150M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  coturn:
    image: coturn/coturn:4.6.3
    restart: unless-stopped
    network_mode: "host"
    environment:
      - TURN_USERNAME=${TURN_USERNAME:-pandityatra}
      - TURN_PASSWORD=${TURN_PASSWORD:-pandityatra_turn_password}
      - TURN_REALM=${TURN_REALM:-pandityatra.local}
    deploy:
      resources:
        limits:
          memory: 100M

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-backend.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    deploy:
      resources:
        limits:
          memory: 50M
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
