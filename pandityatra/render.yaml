services:
  # 1. Backend Service (Django)
  - type: web
    name: pandityatra-backend
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/users/site-content/  # PUBLIC endpoint (AllowAny) for health check
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: pandityatra-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: pandityatra-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "pandityatra-backend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        # Added wildcard support for Vercel
        value: "https://*.vercel.app,https://pandityatra-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        # Added wildcard support for Vercel
        value: "https://*.vercel.app,https://pandityatra-backend.onrender.com"

  # 2. Redis (for WebSockets/Channels)
  - type: keyvalue
    name: pandityatra-redis
    plan: free
    ipAllowList: [] # Only allow internal traffic

# 3. PostgreSQL Database
databases:
  - name: pandityatra-db
    plan: free
